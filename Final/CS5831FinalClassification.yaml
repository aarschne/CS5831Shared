name: CS5831FinalClassification
channels:
  - conda-forge

dependencies:
  - python=3.12

  # core libraries
  - numpy
  - pandas
  - scipy

  # scikit-learn
  - scikit-learn

  # gradient boosting libraries
  - xgboost
  - lightgbm
  - catboost

  # deep learning backend (required for TabNet)
  - pytorch

  # Jupyter + kernel
  - jupyterlab
  - ipykernel

  # plotting
  - matplotlib

  # pip (needed for TabNet)
  - pip
  - pip:
      - pytorch-tabnet